<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; 
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:; 
        media-src 'self' blob:; 
        connect-src 'self' ws://localhost:* http://localhost:* https://generativelanguage.googleapis.com wss://generativelanguage.googleapis.com https://api.deepgram.com wss://api.deepgram.com https://*.googleapis.com;">
    <title>Gemini Live</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <div class="browser-controls">
            <button id="browserBackBtn" title="Back">⬅️</button>
            <button id="browserForwardBtn" title="Forward">➡️</button>
            <button id="browserReloadBtn" title="Reload">🔄</button>
            <input type="text" id="browserUrlInput" placeholder="Enter URL or search..." class="browser-url-input">
            <button id="browserGoBtn">Go</button>
            <select id="browserModeSelect">
                <option value="internal">Internal</option>
                <option value="external">External</option>
            </select>
            <input type="number" id="browserPortInput" value="9222" style="width: 60px;" title="Remote Port">
            <button id="browserConnectBtn" title="Connect to External Browser">🔗</button>
            <button id="launchChromeBtn" title="Launch Chrome">🌐 Chrome</button>
            <button id="launchEdgeBtn" title="Launch Edge">🌐 Edge</button>
        </div>
        <button id="disconnectBtn" class="disconnect-btn">Disconnect</button>
        <button id="connectBtn" class="connect-btn" style="display: none;">Connect</button>
        <button id="settingsBtn" class="settings-btn">⚙️</button>
        <button id="cameraBtn" class="camera-btn">
            <span class="camera-icon">📷</span>
        </button>
        <button id="screenBtn" class="screen-btn">
            <span class="screen-icon">🖥️</span>
        </button>
        <button id="micBtn" class="mic-btn">
            <span class="mic-icon">🎤</span>
        </button>
        <div id="chatHistory" class="chat-history"></div>
        <canvas id="visualizer" class="visualizer"></canvas>
        <div id="cameraPreview" class="camera-preview"></div>
        <div id="screenPreview" class="screen-preview"></div>
        <div class="text-input-container">
            <input type="text" id="messageInput" placeholder="Type your message..." class="text-input">
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
    </div>
    <script type="module" src="js/script.js"></script>
</body>
</html>
